{% extends 'base/layout.html' %}
{% load static %}

{% block title %}Cable Length Calculator{% endblock %}

{% block content %}
<div class="row">
  <div class="col-12">
    <div class="card">
      <h5 class="card-header">Cable Length Calculator</h5>
      <div class="card-body p-3">
        <div id="cable-calc-root"></div>
      </div>
    </div>
  </div>
</div>

<script>
  window.NETBOX_RACKS     = {{ rack_data_json|safe }};
  window.NETBOX_DEVICES   = {{ device_data_json|safe }};
  window.NETBOX_CFG       = {{ plugin_cfg_json|safe }};
  window.NETBOX_SITE_TREE = {{ site_tree_json|safe }};
  window.NETBOX_SELECTED  = {
    site_id:     {{ selected_site_id|default:"null" }},
    location_id: {{ selected_location_id|default:"null" }},
  };

function recalculateBOM() {
  const siteId = document.getElementById('site_id').value;
  const locationId = document.getElementById('location_id').value;
  if (!siteId) {
    alert('Please select a site first');
    return;
  }
  let url = '/plugins/cable-calc/bom/?site_id=' + siteId + '&recalculate=true';
  if (locationId) url += '&location_id=' + locationId;
  window.location.href = url;
}
</script>
<script src="{% static 'netbox_cable_calc/calculator.bundle.js' %}?v=2">
function recalculateBOM() {
  const siteId = document.getElementById('site_id').value;
  const locationId = document.getElementById('location_id').value;
  if (!siteId) {
    alert('Please select a site first');
    return;
  }
  let url = '/plugins/cable-calc/bom/?site_id=' + siteId + '&recalculate=true';
  if (locationId) url += '&location_id=' + locationId;
  window.location.href = url;
}
</script>
{% endblock %}
