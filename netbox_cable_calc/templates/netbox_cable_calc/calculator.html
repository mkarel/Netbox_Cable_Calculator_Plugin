{% extends 'base/layout.html' %}
{% load static %}
{% block title %}Cable Length Calculator{% endblock %}
{% block content %}
<div class="row">
  <div class="col-12">
    <div class="card">
      <h5 class="card-header">Cable Length Calculator</h5>
      <div class="card-body p-3">
        <div class="d-flex">
          <div id="cable-calc-root" style="flex: 1;"></div>
          <div class="ms-3" style="width: 200px;">
            <button class="btn btn-secondary w-100" onclick="window.recalculateBOM()">
              <i class="ti ti-refresh"></i> Recalculate BOM
            </button>
            <div class="mt-3 text-muted small">
              <p>Click to force fresh calculation of all cable lengths.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  window.NETBOX_RACKS     = {{ rack_data_json|safe }};
  window.NETBOX_DEVICES   = {{ device_data_json|safe }};
  window.NETBOX_CFG       = {{ plugin_cfg_json|safe }};
  window.NETBOX_SITE_TREE = {{ site_tree_json|safe }};
  window.NETBOX_SELECTED  = {
    site_id:     {{ selected_site_id|default:"null" }},
    location_id: {{ selected_location_id|default:"null" }},
  };
  
  // Recalculate BOM by adding ?recalculate=true to current URL
  window.recalculateBOM = function() {
    const currentUrl = new URL(window.location.href);
    currentUrl.searchParams.set('recalculate', 'true');
    window.location.href = currentUrl.toString();
  };
</script>
<script src="{% static 'netbox_cable_calc/calculator.bundle.js' %}?v=2"></script>
{% endblock %}
